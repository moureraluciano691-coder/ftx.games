<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Academy</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
}

header {
    background: #020617;
    padding: 20px;
    text-align: center;
}

header h1 {
    margin: 0;
    color: #38bdf8;
}

nav {
    text-align: center;
    background: #020617;
    padding: 10px;
}

nav a {
    color: white;
    margin: 10px;
    text-decoration: none;
}

.hero {
    text-align: center;
    padding: 60px 20px;
}

.hero button {
    background: #38bdf8;
    border: none;
    padding: 15px 30px;
    color: black;
    font-weight: bold;
}

.cursos {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
}

.curso {
    background: #1e293b;
    margin: 15px;
    padding: 20px;
    width: 250px;
    border-radius: 10px;
    text-align: center;
}

footer {
    text-align: center;
    padding: 15px;
    background: #020617;
}
</style>
</head>

<body>

<header>
    <h1>🎮 Game Academy</h1>
    <p>Aprenda a jogar como um profissional</p>
</header>

<nav>
    <a href="#">Início</a>
    <a href="#">Cursos</a>
    <a href="#">Contato</a>
</nav>

<section class="hero">
    <h2>Domine os jogos mais populares</h2>
    <button>Começar</button>
</section>

<section class="cursos">
    <div class="curso">
        <h3>Curso de Fortnite</h3>
        <p>Melhore sua gameplay</p>
    </div>

    <div class="curso">
        <h3>Curso de Free Fire</h3>
        <p>Suba de patente</p>
    </div>
</section>

<footer>
    <p>© 2026 Game Academy</p>
</footer>

</body>
</html>
